name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend for GitHub Pages
        working-directory: frontend
        env:
          VITE_BASE_PATH: /GaokaoAgent/
          VITE_API_URL: ${{ vars.PUBLIC_API_URL }}
          VITE_SHOW_ADMISSIONS_DEMO: "true"
        run: npm run build

      - name: Add GitHub Pages SPA fallback
        run: |
          cp frontend/dist/index.html frontend/dist/404.html
          mkdir -p frontend/dist/admissions-opportunity-demo frontend/dist/deep-opportunity-card frontend/dist/external-plan-audit-demo frontend/dist/report-template-preview
          cp frontend/dist/index.html frontend/dist/admissions-opportunity-demo/index.html
          cp frontend/dist/index.html frontend/dist/deep-opportunity-card/index.html
          cp frontend/dist/index.html frontend/dist/external-plan-audit-demo/index.html
          cp frontend/dist/index.html frontend/dist/report-template-preview/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
