services:
  gaokaoagent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gaokaoagent
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      # Set one of the following modes (and keys) in your environment or in a `.env` file:
      # - LLM_PROVIDER=local  (requires Ollama reachable from the container)
      # - LLM_PROVIDER=cloud  (requires QWEN_API_KEY / OPENAI_API_BASE / QWEN_MODEL)
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-plus}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
